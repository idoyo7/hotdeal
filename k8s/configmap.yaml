apiVersion: v1
kind: ConfigMap
metadata:
  name: fmkorea-hotdeal-monitor-config
data:
  FMKOREA_BOARD_URL: "https://m.fmkorea.com/hotdeal"
  FMKOREA_BOARD_URLS: "https://www.fmkorea.com/hotdeal"
  CRAWL_MODE: "playwright"
  REQUEST_INTERVAL_MS: "180000"
  REQUEST_TIMEOUT_MS: "20000"
  MAX_ITEMS_PER_POLL: "30"
  MAX_PAGES_PER_POLL: "1"
  STARTUP_MAX_ITEMS_PER_POLL: "120"
  STARTUP_MAX_PAGES_PER_POLL: "8"
  STATE_FILE_PATH: "/app/data/seen.json"
  USE_FILE_STATE: "false"
  USE_REDIS_STATE: "true"
  REDIS_URL: "redis://fmkorea-hotdeal-redis:6379"
  REDIS_KEY_PREFIX: "hotdeal:seen:"
  REDIS_TTL_SECONDS: "604800"
  LEADER_ELECTION_ENABLED: "true"
  LEADER_ELECTION_LEASE_NAME: "fmkorea-hotdeal-monitor"
  LEADER_ELECTION_LEASE_DURATION_SECONDS: "30"
  LEADER_ELECTION_RENEW_INTERVAL_MS: "10000"
  LOG_LEVEL: "info"
  LOOKBACK_HOURS: "3"
  STARTUP_LOOKBACK_HOURS: "168"
  SHOW_RECENT_MATCHES: "true"
  RUN_ONCE: "false"
  DRY_RUN: "false"
  ALERT_KEYWORDS: "삼다수,요기요"
