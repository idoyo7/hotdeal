apiVersion: apps/v1
kind: Deployment
metadata:
  name: fmkorea-hotdeal-monitor
  labels:
    app: fmkorea-hotdeal-monitor
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  minReadySeconds: 10
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: fmkorea-hotdeal-monitor
  template:
    metadata:
      labels:
        app: fmkorea-hotdeal-monitor
    spec:
      serviceAccountName: fmkorea-hotdeal-monitor
      terminationGracePeriodSeconds: 90
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
      containers:
        - name: monitor
          image: docker.io/montkim9/fmkorea-hotdeal-monitor:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: fmkorea-hotdeal-monitor-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /tmp/monitor-ready"
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /tmp/monitor-ready"
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "tr '\\000' ' ' < /proc/1/cmdline | grep -q 'dist/index.js'"
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - "kill -TERM 1; sleep 15"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: fmkorea-hotdeal-monitor-secret
                  key: slack-webhook-url
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fmkorea-hotdeal-monitor-secret
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: fmkorea-hotdeal-monitor-secret
                  key: telegram-chat-id
