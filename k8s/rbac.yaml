apiVersion: v1
kind: ServiceAccount
metadata:
  name: fmkorea-hotdeal-monitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fmkorea-hotdeal-monitor-leader-election
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fmkorea-hotdeal-monitor-leader-election
subjects:
  - kind: ServiceAccount
    name: fmkorea-hotdeal-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fmkorea-hotdeal-monitor-leader-election
