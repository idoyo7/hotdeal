apiVersion: apps/v1
kind: Deployment
metadata:
  name: fmkorea-hotdeal-monitor
  labels:
    app: fmkorea-hotdeal-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fmkorea-hotdeal-monitor
  template:
    metadata:
      labels:
        app: fmkorea-hotdeal-monitor
    spec:
      serviceAccountName: fmkorea-hotdeal-monitor
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        - name: state-store
          persistentVolumeClaim:
            claimName: fmkorea-hotdeal-monitor-data
      containers:
        - name: monitor
          image: docker.io/montkim9/fmkorea-hotdeal-monitor:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: fmkorea-hotdeal-monitor-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: USE_FILE_STATE
              value: "true"
            - name: USE_REDIS_STATE
              value: "false"
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: fmkorea-hotdeal-monitor-secret
                  key: slack-webhook-url
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: fmkorea-hotdeal-monitor-secret
                  key: telegram-bot-token
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: fmkorea-hotdeal-monitor-secret
                  key: telegram-chat-id
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: state-store
              mountPath: /app/data
