name: Build and publish image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: montkim9
      DOCKERHUB_PASSWORD: ${{ secrets.docker_password || secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_PASSWORD}" ]; then
            echo "Missing Docker Hub credentials. Set repository secret: docker_password." >&2
            exit 1
          fi
          echo "Docker Hub credentials detected for account ${DOCKERHUB_USERNAME}."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Verify Docker Hub login before build
        run: |
          echo "${DOCKERHUB_PASSWORD}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin >/dev/null
          echo "Docker Hub login verification succeeded."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/fmkorea-hotdeal-monitor:${{ env.SHORT_SHA }}
            ${{ env.DOCKERHUB_USERNAME }}/fmkorea-hotdeal-monitor:latest
          platforms: linux/amd64
          # platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image push
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Verifying pushed image..."
          docker manifest inspect ${{ env.DOCKERHUB_USERNAME }}/fmkorea-hotdeal-monitor:${{ env.SHORT_SHA }}
          echo "Image successfully pushed with tag: ${{ env.SHORT_SHA }}"
