name: Build and publish image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: montkim9
      DOCKERHUB_PASSWORD: ${{ secrets.docker_password || secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: montkim9/fmkorea-hotdeal-monitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_PASSWORD}" ]; then
            echo "Missing Docker Hub credentials. Set repository secret: docker_password." >&2
            exit 1
          fi
          echo "Docker Hub credentials detected for account ${DOCKERHUB_USERNAME}."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Type check and build
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image push
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Verifying pushed image..."
          docker manifest inspect ${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}
          echo "Image successfully pushed with tag: ${{ env.SHORT_SHA }}"

      - name: Update montstrap manifest
        if: github.ref == 'refs/heads/main'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "${GH_PAT}" ]; then
            echo "::warning::GH_PAT not set — skipping GitOps manifest update"
            exit 0
          fi

          git clone --depth 1 https://x-access-token:${GH_PAT}@github.com/idoyo7/montstrap.git /tmp/montstrap
          cd /tmp/montstrap

          MANIFEST="stage/hotdeal/manifests/deployment.yaml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::Manifest not found: $MANIFEST"
            exit 1
          fi

          sed -i "s|image: docker.io/${IMAGE_NAME}:.*|image: docker.io/${IMAGE_NAME}:${SHORT_SHA}|" "$MANIFEST"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add "$MANIFEST"
          git commit -m "chore(hotdeal): update image tag to ${SHORT_SHA}

          Triggered by idoyo7/hotdeal@${GITHUB_SHA::8}"
          git push origin main
